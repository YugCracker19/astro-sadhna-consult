      <div class="relative h-28 flex items-center justify-center overflow-hidden" style="background: var(--gradient-primary);">
        <div class="absolute inset-0 starfield opacity-40 mix-blend-overlay"></div>
        <div class="relative inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-white/20 backdrop-blur-sm border border-white/30 text-white text-xs font-semibold">
          <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
          <span id="lead-badge"></span>
        </div>
        <button id="lead-close" class="absolute top-3 right-3 w-8 h-8 rounded-full bg-white/20 hover:bg-white/30 text-white flex items-center justify-center">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
      <div class="p-6 md:p-8">
        <h3 id="lead-title" class="font-display text-2xl md:text-3xl font-bold leading-tight"></h3>
        <p id="lead-subtitle" class="mt-2 text-sm text-muted-foreground"></p>
        <form id="lead-form" class="mt-6 space-y-4">
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-foreground/70 mb-1.5" id="lead-lbl-name"></label>
            <input id="lead-name" type="text" maxlength="60" required class="w-full rounded-xl border border-border bg-background px-4 py-3 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition" />
          </div>
          <div>
            <label class="block text-xs font-semibold uppercase tracking-wider text-foreground/70 mb-1.5" id="lead-lbl-phone"></label>
            <input id="lead-phone" type="tel" maxlength="20" required placeholder="+91 98xxxxxxxx" class="w-full rounded-xl border border-border bg-background px-4 py-3 text-sm outline-none focus:border-primary focus:ring-2 focus:ring-primary/20 transition" />
          </div>
          <p id="lead-error" class="text-xs font-medium text-destructive hidden"></p>
          <button type="submit" class="btn-glow w-full text-primary-foreground font-semibold px-6 py-3.5 rounded-full inline-flex items-center justify-center gap-2 text-base">
            <i data-lucide="message-circle" class="w-5 h-5" fill="currentColor" stroke-width="0"></i>
            <span id="lead-submit"></span>
          </button>
          <button type="button" id="lead-skip" class="w-full text-xs text-muted-foreground hover:text-foreground transition-colors"></button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ============ CART DRAWER ============ -->
<div id="cart-drawer" class="fixed inset-0 z-[65] hidden">
  <div id="cart-backdrop" class="absolute inset-0 bg-foreground/60 backdrop-blur-sm"></div>
  <aside class="absolute right-0 top-0 bottom-0 w-full sm:max-w-md bg-background border-l border-border/60 flex flex-col shadow-2xl">
    <div class="px-6 pt-6 pb-4 border-b border-border/60 flex items-center justify-between">
      <h3 class="flex items-center gap-2 font-display text-2xl font-bold">
        <i data-lucide="shopping-bag" class="w-5 h-5 text-primary"></i>
        <span id="cart-title"></span>
        <span id="cart-title-count" class="text-sm text-muted-foreground font-normal"></span>
      </h3>
      <button id="cart-close" class="w-8 h-8 rounded-full hover:bg-muted flex items-center justify-center"><i data-lucide="x" class="w-4 h-4"></i></button>
    </div>
    <div id="cart-body" class="flex-1 overflow-y-auto"></div>
    <div id="cart-foot" class="border-t border-border/60 bg-secondary/40"></div>
  </aside>
</div>

<!-- ============ TOAST ============ -->
<div id="toast" class="fixed bottom-24 right-6 z-[80] hidden bg-card border border-border rounded-xl shadow-2xl p-4 max-w-sm">
  <div id="toast-title" class="font-semibold text-sm"></div>
  <div id="toast-desc" class="text-xs text-muted-foreground mt-1"></div>
</div>

<script src="script.js"></script>
</body>
</html>
